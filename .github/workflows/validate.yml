name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check JS
        run: |
          find bin lib -name '*.js' -print0 | xargs -0 -I{} node --check {}

      - name: Validate example workspaces
        run: |
          chmod +x validators/*.sh
          for d in examples/*; do
            [ -d "$d" ] || continue
            if [ -f "$d/SOUL.md" ]; then
              node bin/agent-forge.js validate "$d"
            else
              echo "Skipping $d (documentation-only example)"
            fi
          done

      - name: Shellcheck validator scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck validators/*.sh
