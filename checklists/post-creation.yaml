# Post-Creation Checklist
# Verify after agent workspace is set up

workspace_setup:
  - "Directory created at ~/.openclaw/workspace-<agent-id>/"
  - "IDENTITY.md — Name, emoji, role"
  - "SOUL.md — Full identity and standards (includes ACE Loop + Self-Correction)"
  - "AGENTS.md — Operating procedures"
  - "TOOLS.md — Tool conventions (includes NeuroBits, Mem0, Knowledge Lookup)"
  - "USER.md — Multi-agent context"
  - "MEMORY.md — Initial structure"
  - "expertise/ folders created"
  - "evolution/ folders created"

registration:
  - "Registered in openclaw.json with workspace path"
  - "Gateway restarted"

inter_agent_communication:
  - "subagents.allowAgents: ['*'] added"
  - "Agent added to tools.agentToAgent.allow"
  - "org/ symlinked to workspace"
  - "Agent added to org/DIRECTORY.md"

discord_identity:
  - "Discord bot application created"
  - "Bot invited to server"
  - "Account added to config"
  - "Binding created"
  - "Verified bot responds from own identity"

evolution_and_testing:
  - "Daily evolution cron created"
  - "Introduction test passed"
  - "Autonomous learning test passed"
  - "Mem0 storage verified"

documentation:
  - "Dashboard updated"
  - "AGENT_REGISTRY.md updated"
  - "ROADMAP.md updated"

code_review_certification:
  note: "Required for developer agents only"
  items:
    - "Core review skills installed"
    - "Domain-wisdom module read"
    - "Gauntlet attempted (if applicable)"
    - "Certification status recorded"
